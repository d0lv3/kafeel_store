<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Seamless interlaced Islamic star lattice. -->
  <!-- Whole motif is 93% transparent (group opacity 0.07). -->
  <g opacity="0.07">
    <g fill="none" stroke="#2f8636" stroke-width="1.3" stroke-linejoin="round">
      <!-- center 8-point star (square + diamond) -->
      <rect x="38" y="38" width="44" height="44"/>
      <polygon points="60,29 91,60 60,91 29,60"/>
      <!-- central rosette -->
      <rect x="52" y="52" width="16" height="16"/>
      <polygon points="60,50 70,60 60,70 50,60"/>

      <!-- corner 8-point stars (quarter each — seamless at junctions) -->
      <rect x="-22" y="-22" width="44" height="44"/>
      <polygon points="0,-31 31,0 0,31 -31,0"/>
      <rect x="98" y="-22" width="44" height="44"/>
      <polygon points="120,-31 151,0 120,31 89,0"/>
      <rect x="-22" y="98" width="44" height="44"/>
      <polygon points="0,89 31,120 0,151 -31,120"/>
      <rect x="98" y="98" width="44" height="44"/>
      <polygon points="120,89 151,120 120,151 89,120"/>

      <!-- diagonal connecting straps (interlace) -->
      <line x1="38" y1="38" x2="22" y2="22"/>
      <line x1="82" y1="38" x2="98" y2="22"/>
      <line x1="38" y1="82" x2="22" y2="98"/>
      <line x1="82" y1="82" x2="98" y2="98"/>
    </g>

    <g fill="#3CA043" fill-opacity="0.55">
      <!-- edge-midpoint accents (seamless across edges) -->
      <polygon points="60,-10 70,0 60,10 50,0"/>
      <polygon points="-10,60 0,70 10,60 0,50"/>
      <polygon points="110,60 120,70 130,60 120,50"/>
      <polygon points="60,110 70,120 60,130 50,120"/>
      <circle cx="60" cy="60" r="2.6"/>
    </g>
  </g>
</svg>
