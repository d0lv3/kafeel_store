<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — ماركت الكفيل</title>
  <meta name="description" content="لوحة تحكم ماركت الكفيل لإدارة الطلبات والقائمة">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest-admin.json">
  <link rel="apple-touch-icon" href="assets/kafeel_icon.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ═══ INSTALL BANNER ═══ -->
<div class="admin-install-banner" id="adminInstallBanner">
  <img src="assets/kageel_bg_removed.png" alt="الكفيل" class="admin-install-logo">
  <div class="admin-install-text">
    <strong>ثبّت تطبيق الكفيل أدمن</strong>
    <span>وصول أسرع للوحة التحكم</span>
  </div>
  <button class="admin-install-btn" id="adminInstallBtn">تثبيت</button>
  <button class="admin-install-dismiss" id="adminInstallDismiss">✕</button>
</div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="admin-login-overlay" id="loginOverlay">
  <div class="login-card">
    <img src="assets/kafeel_logo.png" alt="الكفيل" class="login-logo">
    <h2>لوحة التحكم</h2>
    <form id="loginForm" autocomplete="off">
      <div class="login-input-wrap" style="margin-bottom:12px;">
        <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" required autocomplete="username">
      </div>
      <div class="login-input-wrap">
        <input type="password" id="adminPassword" placeholder="كلمة المرور" required autocomplete="current-password">
        <button type="button" class="toggle-pass" id="togglePass">
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="login-btn" id="loginBtn">دخول</button>
    </form>
  </div>
</div>

<header class="admin-header">
  <img src="assets/kafeel_logo.png" alt="الكفيل" class="logo">
  <h1>لوحة التحكم</h1>
  <div class="status-toggle" id="statusToggle">
    <span class="status-label" id="statusLabel">مفتوح</span>
    <label class="toggle-switch">
      <input type="checkbox" id="statusSwitch" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <button class="refresh-btn" id="refreshBtn" title="تحديث">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
  </button>
  <div class="header-badge" id="orderCountBadge">0 طلبات نشطة</div>
</header>

<!-- Admin Navbar -->
<nav class="admin-navbar" id="adminNavbar">
  <button class="nav-btn active" data-view="dashboard" id="navDashboard">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    لوحة التحكم
  </button>
  <button class="nav-btn" data-view="preview" id="navPreview">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    عرض القائمة
  </button>
</nav>

<!-- Dashboard View -->
<div class="admin-view active" id="dashboardView">

<!-- Tabs -->
<nav class="admin-tabs">
  <button class="admin-tab active" data-tab="orders" id="tabOrders"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> الطلبات</button>
  <button class="admin-tab" data-tab="completed" id="tabCompleted"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> الطلبات المكتملة</button>

  <button class="admin-tab" data-tab="sections" id="tabSections"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg> الأقسام</button>
  <button class="admin-tab" data-tab="promos" id="tabPromos"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> أكواد الخصم</button>
</nav>

<!-- Content -->

        <div class="stat-label">إجمالي الإيرادات</div>

      <div class="stat-card">

    <div id="completedOrdersList" class="completed-orders-list"></div>
    <button type="button" class="load-more-btn" id="loadMoreBtn" style="display:none">عرض المزيد</button>

  <!-- ═══ MENU TAB ═══ -->

  <!-- ═══ SECTIONS TAB ═══ -->

<!-- PWA Install Logic -->
<script>
(function() {
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  if (localStorage.getItem('admin_pwa_dismissed')) return;

  var banner = document.getElementById('adminInstallBanner');
  var installBtn = document.getElementById('adminInstallBtn');
  var dismissBtn = document.getElementById('adminInstallDismiss');
  var deferredPrompt = null;

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add('visible');
  });

  if (isIOS && !window.navigator.standalone) {
    installBtn.textContent = 'كيف؟';
    setTimeout(function() { banner.classList.add('visible'); }, 500);
  }

  installBtn.addEventListener('click', function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
      banner.classList.remove('visible');
    } else if (isIOS) {
      var shareIcon = '<svg style="display:inline-block;vertical-align:middle;margin:0 2px;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
      banner.querySelector('.admin-install-text').innerHTML =
        '<strong style="margin-bottom:6px;display:block;">لتثبيت التطبيق:</strong>' +
        '<div style="font-size:12px;line-height:1.8;color:#666;">' +
          '<div>١. اضغط على ' + shareIcon + ' في شريط Safari</div>' +
          '<div>٢. اختر <strong>"إضافة إلى الشاشة الرئيسية"</strong></div>' +
          '<div>٣. اضغط <strong>"إضافة"</strong></div>' +
        '</div>';
      installBtn.style.display = 'none';
    }
  });

  dismissBtn.addEventListener('click', function() {
    banner.classList.remove('visible');
    localStorage.setItem('admin_pwa_dismissed', '1');
  });
})();
</script>
</body>
